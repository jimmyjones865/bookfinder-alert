<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bookfinder alert</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login-view" class="container-xs hidden">
    <div class="card">
      <h1 class="section-title">bookfinder alert</h1>
      <form id="login-form">
        <div class="field">
          <label class="label" for="password">Password</label>
          <input class="input" type="password" id="password" autofocus required />
        </div>
        <button class="btn btn-primary" type="submit">Log in</button>
        <div id="login-feedback" class="feedback"></div>
      </form>
    </div>
  </div>

  <div id="app-view" class="container hidden">
    <div class="row" style="justify-content: space-between; align-items: center;">
      <h1 class="section-title">bookfinder alert</h1>
      <div>
        <button id="check-now-btn" class="btn btn-secondary btn-sm">Check now</button>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Log out</button>
      </div>
    </div>

    <div class="card">
      <form id="add-form" class="row-3">
        <div class="field">
          <label class="label">Author</label>
          <input class="input" type="text" name="author" />
        </div>
        <div class="field">
          <label class="label">Title</label>
          <input class="input" type="text" name="title" />
        </div>
        <div class="field">
          <label class="label">ISBN</label>
          <input class="input" type="text" name="isbn" />
        </div>
        <div class="field">
          <label class="label">Threshold price (€)</label>
          <input class="input" type="number" name="thresholdPrice" step="0.01" min="0" required />
        </div>
        <div class="field" style="align-self: end;">
          <button class="btn btn-primary" type="submit">Add book</button>
        </div>
      </form>
      <div id="add-feedback" class="feedback"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Book</th>
          <th>Threshold</th>
          <th>Lowest seen</th>
          <th>Checked</th>
          <th>bookfinder</th>
          <th>viaLibri</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="book-list"></tbody>
    </table>
    <div id="list-empty" class="empty-state hidden">No books being watched yet.</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
